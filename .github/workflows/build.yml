name: Build & publish

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: "build"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout vault content
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: bdelanghe/unfold-obsidian-vault
          path: vault

      - name: Setup Deno
        uses: denoland/setup-deno@11b63cf76cfcafb4e43f97b6cad24d8e8438f62d # v1
        with:
          deno-version: 2.6.6

      - name: Compute site URL
        id: site
        run: |
          if [ -n "${SITE_URL:-}" ]; then
            echo "site_url=${SITE_URL}" >> "$GITHUB_OUTPUT"
          else
            echo "site_url=https://unfold.robertdelanghe.com" >> "$GITHUB_OUTPUT"
          fi
        env:
          SITE_URL: ${{ vars.SITE_URL }}

      - name: Cache Deno
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.cache/deno
          key: deno-${{ runner.os }}-${{ hashFiles('deno.lock') }}

      - name: Validate content
        run: deno task validate
        env:
          SITE_URL: ${{ steps.site.outputs.site_url }}
          SITE_OUTPUT_DIR: .unfold/site
          VAULT_PATH: vault

      - name: Build site
        run: deno task build
        env:
          SITE_URL: ${{ steps.site.outputs.site_url }}
          SITE_OUTPUT_DIR: .unfold/site
          VAULT_PATH: vault

      - name: Validate AI exports
        run: deno test -A src/unfold/exporters/exporters_ai_test.ts
        env:
          SITE_URL: ${{ steps.site.outputs.site_url }}
          SITE_OUTPUT_DIR: .unfold/site
          VAULT_PATH: vault

  container-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout vault content
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: bdelanghe/unfold-obsidian-vault
          path: vault

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build Unfold dev image (local)
        env:
          IMAGE_NAME: unfold-dev-ci
        run: docker buildx bake unfold-dev --load

      - name: Start Unfold container
        run: |
          docker run -d -p 3000:3000 \
            -e SITE_URL=http://localhost:3000 \
            -e VAULT_PATH=vault \
            -v "$PWD/vault:/workspaces/schema-nodes/vault" \
            --name unfold-smoke \
            unfold-dev-ci:latest
          for i in $(seq 1 30); do
            running=$(docker inspect -f '{{.State.Running}}' unfold-smoke 2>/dev/null || echo "false")
            if [ "$running" != "true" ]; then
              echo "Container exited before health check passed."
              docker logs unfold-smoke || true
              exit 1
            fi
            curl -fsS http://localhost:3000/healthz >/dev/null 2>&1 && exit 0
            sleep 1
          done
          docker logs unfold-smoke || true
          exit 1

      - name: Stop Unfold container
        if: always()
        run: docker rm -f unfold-smoke || true

  publish-image:
    runs-on: ubuntu-latest
    needs: [build, container-smoke]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bake and push image
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/unfold-dev
        run: docker buildx bake unfold-dev --push
